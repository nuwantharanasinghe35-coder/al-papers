  <style>
    :root {
      --biology: #10b981;
      --text: #1e293b;
      --text-light: #64748b;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Noto Sans Sinhala', sans-serif; 
      background: var(--bg); 
      color: var(--text);
      padding: 20px; 
    }
    .container { max-width: 800px; margin: 0 auto; }
    .back-btn { 
      display: inline-block; 
      margin-bottom: 20px; 
      color: #2563eb; 
      text-decoration: none; 
      font-weight: 600; 
    }
    .back-btn:hover { text-decoration: underline; }
    h1 { 
      color: var(--text); 
      font-size: 32px;
      margin-bottom: 32px;
      text-align: center;
    }
    .papers-list { 
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
    }
    .paper-link { 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      padding: 18px 24px; 
      background: var(--card-bg); 
      border-radius: 12px; 
      text-decoration: none; 
      color: var(--text); 
      border: 1px solid var(--border);
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .paper-link:hover { 
      border-color: var(--biology); 
      background: #f0fdf4;
      transform: translateX(4px);
    }
    .year { 
      color: var(--biology); 
      font-weight: 700; 
      font-size: 18px;
      min-width: 60px;
    }
    .paper-name {
      flex: 1;
      text-align: left;
      margin: 0 16px;
    }
    .open-icon { 
      color: var(--text-light); 
      font-size: 20px;
    }
  </style>
