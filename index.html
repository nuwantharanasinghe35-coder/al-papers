<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A/L Science Past Papers | 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sinhala: #10b981;
      --english: #f59e0b;
      --tamil: #ef4444;
      --text: #1e293b;
      --text-light: #64748b;
      --bg: #f8fafc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans Sinhala', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { 
      max-width: 550px; 
      width: 100%; 
      text-align: center; 
    }
    h1 { 
      font-size: 32px; 
      font-weight: 700; 
      margin-bottom: 12px; 
    }
    .subtitle { 
      font-size: 16px; 
      color: var(--text-light); 
      margin-bottom: 32px; 
    }
    
    /* Photo Background Section with Buttons */
    .medium-section {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      margin-bottom: 32px;
    }
    .medium-bg {
      width: 100%;
      height: 450px;
      object-fit: cover;
      display: block;
    }
    .medium-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 30px;
      gap: 16px;
    }
    .medium-title {
      color: white;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    /* Buttons piliwelata */
    .medium-btn {
      width: 100%;
      max-width: 320px;
      padding: 18px 28px;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 20px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      transition: all 0.3s ease;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .medium-btn:hover { 
      transform: translateY(-3px) scale(1.02); 
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .medium-btn.sinhala { background: rgba(16, 185, 129, 0.9); }
    .medium-btn.sinhala:hover { background: rgba(16, 185, 129, 1); }
    .medium-btn.english { background: rgba(245, 158, 11, 0.9); }
    .medium-btn.english:hover { background: rgba(245, 158, 11, 1); }
    .medium-btn.tamil { 
      background: rgba(239, 68, 68, 0.9); 
      font-family: 'Noto Sans Tamil', sans-serif;
    }
    .medium-btn.tamil:hover { background: rgba(239, 68, 68, 1); }
    
    .footer {
      font-size: 14px;
      color: var(--text-light);
      padding-top: 24px;
    }
    @media (max-width: 480px) {
      h1 { font-size: 26px; }
      .medium-bg { height: 420px; }
      .medium-btn { font-size: 18px; padding: 16px 24px; }
      .medium-overlay { padding: 30px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>උසස් පෙළ විද්‍යා පසුගිය ප්‍රශ්න පත්‍ර</h1>
    <p class="subtitle">A/L Science Past Papers Collection</p>
    
    <!-- Photo Background + Buttons Over It -->
    <div class="medium-section">
      <!-- ME PHOTO EKA WENAS KARANNA: images/students.jpg kiyala uba upload karana eka daanna -->
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=800&h=600&fit=crop" 
           alt="Students" 
           class="medium-bg">
      
      <div class="medium-overlay">
        <p class="medium-title">මාධ්‍යය තෝරන්න</p>
        
        <!-- Sinhala Witharai nam meka witharak thiyapan -->
        <a href="sinhala.html" class="medium-btn sinhala">
          සිංහල මාධ්‍ය
        </a>
        
        <!-- English Medium -->
        <a href="english.html" class="medium-btn english">
          English Medium
        </a>
        
        <!-- Tamil Medium -->
        <a href="tamil.html" class="medium-btn tamil">
          தமிழ் மீடியம்
        </a>
      </div>
    </div>

    <div class="footer">
      © 2026 A/L Past Papers | නොමිලේ අධ්‍යාපන සම්පතක්
    </div>
  </div>
</body>
</html>
