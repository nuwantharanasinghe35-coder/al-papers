<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A/L Biology Past Papers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { 
            max-width: 700px; margin: 40px auto; background: white; 
            padding: 40px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .pdf-list { list-style: none; }
        .pdf-list li { margin: 15px 0; }
        .pdf-list a { 
            display: flex; align-items: center; padding: 18px 20px; 
            background: #27ae60; color: white; text-decoration: none; 
            border-radius: 10px; font-weight: 600; font-size: 16px;
            transition: all 0.3s ease;
        }
        .pdf-list a:hover { 
            background: #229954; transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(39,174,96,0.4);
        }
        .year { 
            background: rgba(255,255,255,0.2); padding: 5px 12px; 
            border-radius: 5px; margin-right: 15px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 A/L Biology Past Papers</h1>
        <p class="subtitle">2016 - 2024 Collection</p>
       <ul class="pdf-list">
    <li><a href="pdfs/biology-2024-mcq (3).pdf" target="_blank"><span class="year">2024</span> Biology Paper</a></li>
    <li><a href="pdfs/2019AL Biology.pdf" target="_blank"><span class="year">2019</span> Biology Paper</a></li>
    <li><a href="pdfs/2017AL Biology (1).pdf" target="_blank"><span class="year">2017</span> Biology Paper</a></li>
    <li><a href="pdfs/2016AL Biology.pdf" target="_blank"><span class="year">2016</span> Biology Paper</a></li>
     </ul>
    </div>
</body>
</html>
