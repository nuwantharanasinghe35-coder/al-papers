<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A/L Science Past Papers | 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@400;600;700&family=Noto+Sans+Tamil:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sinhala: #10b981;
      --english: #f59e0b;
      --tamil: #ef4444;
      --text: #1e293b;
      --text-light: #64748b;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans Sinhala', 'Noto Sans Tamil', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { 
      max-width: 500px; 
      width: 100%; 
      text-align: center; 
    }
    h1 { 
      font-size: 32px; 
      font-weight: 700; 
      margin-bottom: 12px; 
    }
    .subtitle { 
      font-size: 16px; 
      color: var(--text-light); 
      margin-bottom: 40px; 
    }
    /* Piliwelata buttons hadana container eka */
    .medium-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 40px;
    }
    .medium-btn {
      padding: 20px 32px;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
      width: 100%;
    }
    .medium-btn:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
    }
    .medium-btn.sinhala { 
      background: var(--sinhala); 
      font-family: 'Noto Sans Sinhala', sans-serif; 
    }
    .medium-btn.english { background: var(--english); }
    .medium-btn.tamil { 
      background: var(--tamil); 
      font-family: 'Noto Sans Tamil', sans-serif; 
    }
    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: var(--text-light);
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }
    @media (max-width: 480px) {
      h1 { font-size: 26px; }
      .medium-btn { font-size: 18px; padding: 18px 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>උසස් පෙළ විද්‍යා පසුගිය ප්‍රශ්න පත්‍ර</h1>
    <p class="subtitle">මාධ්‍යය තෝරන්න | Select Medium | ஊடகம்</p>
    
    <!-- Piliwelata Medium Buttons 3 -->
    <div class="medium-list">
      <a href="sinhala.html" class="medium-btn sinhala">
        සිංහල මාධ්‍ය
      </a>
      
      <a href="english.html" class="medium-btn english">
        English Medium
      </a>
      
      <a href="tamil.html" class="medium-btn tamil">
        தமிழ் மீடியம்
      </a>
    </div>

    <div class="footer">
      © 2026 A/L Past Papers | නොමිලේ අධ්‍යාපන සම්පතක්
    </div>
  </div>
</body>
</html>
