<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A/L Science Past Papers | 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Sinhala:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563eb;
      --text: #1e293b;
      --text-light: #64748b;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --border: #e2e8f0;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }
    .subtitle {
      font-size: 18px;
      color: var(--text-light);
      margin-bottom: 48px;
    }
    .medium-btn {
      display: inline-block;
      padding: 24px 48px;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 16px;
      font-weight: 700;
      font-size: 22px;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3);
      transition: all 0.3s ease;
      font-family: 'Noto Sans Sinhala', sans-serif;
    }
    .medium-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(37, 99, 235, 0.4);
      background: #1d4ed8;
    }
    .footer {
      margin-top: 60px;
      font-size: 14px;
      color: var(--text-light);
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }
    @media (max-width: 480px) {
      h1 { font-size: 28px; }
      .medium-btn { padding: 20px 32px; font-size: 18px; }
      .subtitle { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>A/L Science Past Papers</h1>
    <p class="subtitle">මාධ්‍යය තෝරන්න | Select Your Medium</p>
    
    <!-- Sinhala Medium Button -->
    <a href="sinhala.html" class="medium-btn">
      සිංහල මාධ්‍ය
    </a>

    <div class="footer">
      © 2026 A/L Past Papers | Free Educational Resource
    </div>
  </div>
</body>
</html>
