<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A/L Past Papers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(120deg, #89f7fe 0%, #66a6ff 100%); font-family: Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        h1 { color: #2c3e50; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #7f8c8d; margin-bottom: 30px; font-size: 14px; }
        .subject-btn { display: block; width: 100%; padding: 15px; margin: 12px 0; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; text-decoration: none; color: white; }
        .biology { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .biology:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(102,126,234,0.4); }
        .physics { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .physics:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(245,87,108,0.4); }
        .chemistry { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .chemistry:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(79,172,254,0.4); }
        .footer { margin-top: 25px; font-size: 12px; color: #95a5a6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 A/L Past Papers</h1>
        <p class="subtitle">Select Your Subject</p>
        
        <a href="biology.html" class="subject-btn biology">🧬 Biology</a>
        <a href="physics.html" class="subject-btn physics">⚛️ Physics</a>
        <a href="chemistry.html" class="subject-btn chemistry">🧪 Chemistry</a>
        
        <p class="footer">Made with ❤️ for A/L Students</p>
    </div>
</body>
</html>
